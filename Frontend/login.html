<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DoneRight</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        
        <div class="auth-header">
            <div class="logo-icon"></div>
            <h1>DoneRight</h1>
            <p>Sistem Manajemen Tugas Mahasiswa</p>
        </div>

        <div class="auth-card">
            <h2>Login</h2>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="nama@email.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="Masukkan password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-primary" id="loginButton">
                    Login
                </button>
            </form>

            <div class="auth-footer">
                Belum punya akun? <a href="register.html">Daftar di sini</a>
            </div>
        </div>

    </div>

    <script src="./js/auth_new.js"></script>
</body>
</html>
