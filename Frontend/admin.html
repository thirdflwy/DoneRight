<!DOCTYPE html>
<html>

<head>
    <title>Admin</title>
</head>

<body>

    <h1>Admin Page</h1>

    <button onclick="logout()">
        Logout
    </button>

    <button onclick="generateReport()">
        Generate Laporan Sistem
    </button>

    <hr>

    <h2>Statistics</h2>

    <div id="stats"></div>

    <hr>

    <h2>Manage Global Categories</h2>
    <div>
        <input type="text" id="newCategoryName" placeholder="New Category Name">
        <button id="categorySubmitBtn" onclick="submitCategory()">Add Category</button>
        <button id="categoryCancelBtn" onclick="cancelEditCategory()" style="display:none;">Cancel</button>
    </div>
    <div id="categoriesList" style="margin-top: 10px;"></div>

    <hr>

    <h2>Overdue Tasks</h2>
    <div id="overdueTasks"></div>

    <hr>

    <h2>All Tasks</h2>

    <div id="tasks"></div>

    <script src="./js/admin.js"></script>

</body>

</html>
