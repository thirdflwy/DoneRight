<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - DoneRight</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        
        <div class="auth-header">
            <div class="logo-icon"></div>
            <h1>DoneRight</h1>
            <p>Sistem Manajemen Tugas Mahasiswa</p>
        </div>

        <div class="auth-card">
            <h2>Daftar Akun Baru</h2>
            
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="registerUsername">Username</label>
                    <input type="text" id="registerUsername" class="form-input" placeholder="Masukkan username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" class="form-input" placeholder="nama@email.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" class="form-input" placeholder="Masukkan password" required autocomplete="new-password">
                </div>

                <button type="submit" class="btn-primary" id="registerButton">
                    Daftar
                </button>
            </form>

            <div class="auth-footer">
                Sudah punya akun? <a href="login.html">Login di sini</a>
            </div>
        </div>

    </div>

    <script src="./js/auth_new.js"></script>
</body>
</html>
